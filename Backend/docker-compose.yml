services:
  postgres:
    image: postgres:16-alpine
    container_name: vthink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vthink_timesheet
    ports:
      - "5433:5432"
    volumes:
      - vthink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vthink_timesheet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vthink_postgres_data:
    driver: local
